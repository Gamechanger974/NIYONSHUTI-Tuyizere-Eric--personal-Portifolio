<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartShop – My Cart</title>
  <link rel="stylesheet" href="global.css">
  <style>
    .cart-layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 2rem;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
    }

    .page-header {
      background: linear-gradient(135deg, rgba(233,69,96,0.12), transparent);
      border-bottom: 1px solid var(--glass-border);
      padding: 2.5rem 2rem;
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    /* Cart Items */
    .cart-items-panel {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .cart-items-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cart-items-header h3 { font-size: 1rem; font-weight: 600; }

    .clear-cart-btn {
      font-size: 0.82rem;
      color: var(--accent);
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      transition: var(--transition);
    }

    .clear-cart-btn:hover { opacity: 0.7; }

    .cart-item {
      display: grid;
      grid-template-columns: 90px 1fr auto;
      gap: 1rem;
      align-items: center;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--glass-border);
      transition: var(--transition);
      animation: slideDown 0.3s ease;
    }

    .cart-item:last-child { border-bottom: none; }
    .cart-item:hover { background: rgba(255,255,255,0.03); }

    .cart-item-img {
      width: 90px; height: 72px;
      object-fit: cover;
      border-radius: 10px;
    }

    .cart-item-name {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .cart-item-category {
      font-size: 0.75rem;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.6rem;
    }

    .qty-control {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      overflow: hidden;
      width: fit-content;
    }

    .qty-btn {
      width: 32px; height: 32px;
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .qty-btn:hover { background: var(--glass-strong); }

    .qty-num {
      width: 36px;
      text-align: center;
      font-weight: 600;
      font-size: 0.9rem;
      border-left: 1px solid var(--glass-border);
      border-right: 1px solid var(--glass-border);
      height: 32px;
      line-height: 32px;
    }

    .cart-item-price {
      text-align: right;
    }

    .item-total {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--accent);
    }

    .item-unit { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.25rem; }

    .remove-item {
      display: block;
      margin-top: 0.5rem;
      font-size: 0.78rem;
      color: var(--text-muted);
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      transition: var(--transition);
    }

    .remove-item:hover { color: var(--danger); }

    /* Order Summary */
    .order-summary {
      position: sticky;
      top: 90px;
      height: fit-content;
    }

    .summary-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 1.75rem;
      margin-bottom: 1rem;
    }

    .summary-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.85rem;
      font-size: 0.9rem;
    }

    .summary-row-label { color: var(--text-muted); }

    .summary-divider {
      border: none;
      border-top: 1px solid var(--glass-border);
      margin: 1.25rem 0;
    }

    .summary-total {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .summary-total .summary-row-label { color: var(--text); }

    .summary-total .amount {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--accent);
    }

    /* Promo code */
    .promo-input-wrap {
      display: flex;
      gap: 0.5rem;
    }

    .promo-input-wrap .form-control {
      flex: 1;
      padding: 0.6rem 0.85rem;
      font-size: 0.88rem;
    }

    .promo-input-wrap .btn {
      padding: 0.6rem 1rem;
      font-size: 0.85rem;
    }

    /* Empty cart */
    .empty-cart {
      text-align: center;
      padding: 5rem 2rem;
    }

    .empty-cart-icon { font-size: 5rem; margin-bottom: 1.5rem; opacity: 0.4; }
    .empty-cart h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 0.75rem; }
    .empty-cart p { color: var(--text-muted); margin-bottom: 2rem; }

    @media (max-width: 900px) {
      .cart-layout { grid-template-columns: 1fr; }
      .order-summary { position: static; }
    }

    @media (max-width: 600px) {
      .cart-item { grid-template-columns: 70px 1fr; }
      .cart-item-price { grid-column: 1/-1; display: flex; justify-content: space-between; align-items: center; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar-brand">Smart<span>Shop</span></a>
  <ul class="navbar-links">
    <li><a href="index.html">Home</a></li>    <li><a href="about.html">About Us</a></li>    <li><a href="products.html">Products</a></li>
    <li><a href="checkout.html">Checkout</a></li>
  </ul>
  <div class="navbar-actions">
    <span id="userGreeting" style="color:var(--text-muted);font-size:0.85rem;"></span>
    <a href="cart.html" class="cart-btn">🛒 Cart <span class="cart-count"></span></a>
    <button class="logout-btn">Logout</button>
    <button class="hamburger">☰</button>
  </div>
</nav>

<div class="page-wrapper">
  <div class="page-header">
    <h1>🛒 My Cart</h1>
  </div>

  <div id="cartMain"></div>

</div>

<script src="auth.js"></script>
<script src="shop.js"></script>
<script>
  SmartAuth.requireAuth();
  initNavbar('cart.html');

  function renderCart() {
    const items = Cart.get();
    const main = document.getElementById('cartMain');

    if (items.length === 0) {
      main.innerHTML = `
        <div class="empty-cart fade-in">
          <div class="empty-cart-icon">🛒</div>
          <h2>Your cart is empty</h2>
          <p>Looks like you haven't added anything yet. Discover our amazing furniture collection!</p>
          <a href="products.html" class="btn btn-primary">Start Shopping</a>
        </div>`;
      return;
    }

    const subtotal = Cart.total();
    const delivery = subtotal >= 100000 ? 0 : 8000;
    const tax = Math.round(subtotal * 0.18);
    const total = subtotal + delivery + tax;

    main.innerHTML = `
      <div class="cart-layout">
        <!-- Cart Items -->
        <div>
          <div class="cart-items-panel">
            <div class="cart-items-header">
              <h3>${items.length} item${items.length !== 1 ? 's' : ''} in cart</h3>
              <button class="clear-cart-btn" onclick="clearCart()">🗑 Clear All</button>
            </div>
            <div id="cartItemsList">
              ${items.map(item => `
                <div class="cart-item" id="item-${item.id}">
                  <img src="${item.image}" alt="${item.name}" class="cart-item-img"
                       onerror="this.src='https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=200'">
                  <div>
                    <div class="cart-item-category">${item.category}</div>
                    <div class="cart-item-name">${item.name}</div>
                    <div class="qty-control">
                      <button class="qty-btn" onclick="changeQty('${item.id}', ${(item.qty||1) - 1})">−</button>
                      <span class="qty-num">${item.qty || 1}</span>
                      <button class="qty-btn" onclick="changeQty('${item.id}', ${(item.qty||1) + 1})">+</button>
                    </div>
                  </div>
                  <div class="cart-item-price">
                    <div class="item-total">${formatPrice(item.price * (item.qty||1))}</div>
                    <div class="item-unit">@ ${formatPrice(item.price)} each</div>
                    <button class="remove-item" onclick="removeItem('${item.id}')">✕ Remove</button>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>

          <div style="margin-top:1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;">
            <a href="products.html" class="btn btn-secondary">← Continue Shopping</a>
            <span style="font-size:0.85rem;color:var(--success);">✓ Free delivery on orders over RWF 100,000</span>
          </div>
        </div>

        <!-- Order Summary -->
        <div class="order-summary">
          <div class="summary-card">
            <div class="summary-title">Order Summary</div>

            <div class="summary-row">
              <span class="summary-row-label">Subtotal (${items.length} items)</span>
              <span>${formatPrice(subtotal)}</span>
            </div>
            <div class="summary-row">
              <span class="summary-row-label">Delivery</span>
              <span style="color:${delivery === 0 ? 'var(--success)' : 'inherit'}">${delivery === 0 ? 'FREE' : formatPrice(delivery)}</span>
            </div>
            <div class="summary-row">
              <span class="summary-row-label">VAT (18%)</span>
              <span>${formatPrice(tax)}</span>
            </div>
            <hr class="summary-divider">
            <div class="summary-row summary-total">
              <span class="summary-row-label">Total</span>
              <span class="amount">${formatPrice(total)}</span>
            </div>

            <a href="checkout.html" class="btn btn-primary btn-block" style="margin-top:1.5rem;font-size:1rem;">
              Proceed to Checkout →
            </a>
          </div>

          <div class="summary-card">
            <div class="summary-title" style="font-size:0.95rem;">Promo Code</div>
            <div class="promo-input-wrap">
              <input type="text" class="form-control" id="promoInput" placeholder="Enter code">
              <button class="btn btn-secondary" onclick="applyPromo()" style="padding:0.6rem 1rem;font-size:0.85rem;">Apply</button>
            </div>
            <div id="promoMsg" class="field-msg" style="margin-top:0.5rem;"></div>
          </div>

          <div class="summary-card" style="padding:1.25rem 1.5rem;">
            <div style="display:flex;gap:0.75rem;align-items:flex-start;margin-bottom:0.75rem;">
              <span style="font-size:1.2rem;">🔒</span>
              <div style="font-size:0.82rem;color:var(--text-muted);">Secure checkout — SSL encrypted</div>
            </div>
            <div style="display:flex;gap:0.75rem;align-items:flex-start;margin-bottom:0.75rem;">
              <span style="font-size:1.2rem;">🔄</span>
              <div style="font-size:0.82rem;color:var(--text-muted);">30-day hassle-free returns</div>
            </div>
            <div style="display:flex;gap:0.75rem;align-items:flex-start;">
              <span style="font-size:1.2rem;">📦</span>
              <div style="font-size:0.82rem;color:var(--text-muted);">Delivery across all Rwanda</div>
            </div>
          </div>
        </div>
      </div>`;
  }

  function changeQty(id, newQty) {
    Cart.updateQty(id, newQty);
    renderCart();
  }

  function removeItem(id) {
    Cart.remove(id);
    Toast.show('Item removed from cart', 'info');
    renderCart();
  }

  function clearCart() {
    if (confirm('Clear all items from your cart?')) {
      Cart.clear();
      Toast.show('Cart cleared', 'info');
      renderCart();
    }
  }

  function applyPromo() {
    const code = document.getElementById('promoInput').value.toUpperCase().trim();
    const msg = document.getElementById('promoMsg');
    const valid = { 'SAVE10': '10% off', 'SMART20': '20% off', 'NEWUSER': '15% off' };
    if (valid[code]) {
      msg.textContent = `✓ Code applied: ${valid[code]}!`;
      msg.className = 'field-msg valid';
    } else {
      msg.textContent = 'Invalid or expired promo code';
      msg.className = 'field-msg invalid';
    }
  }

  renderCart();
</script>
</body>
</html>
